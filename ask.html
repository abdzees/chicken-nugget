<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>hi chicken nugget</title>
  <meta name="description" content="a little something for you" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/ask.css" />
</head>
<body class="ask-body">
  <!-- bunny-rain reveal cover (fills, then drops away to unveil this page) -->
  <div id="bunny-rain" class="bunny-rain" aria-hidden="true"></div>
  <div id="ask-stars" class="hub-stars" aria-hidden="true"></div>

  <main class="ask">
    <div class="gif-wrap photo-box">
      <video id="cat-video" src="cat-talking-cat.mp4" autoplay loop muted playsinline preload="auto"></video>
      <canvas id="cat-canvas" aria-hidden="true"></canvas>
    </div>

    <h1 class="ask-q"><span class="ask-q-caps">HEY CHICKEN NUGGET</span><br><span class="ask-q-sub">do you want to see your gifts?</span></h1>

    <div class="ask-btns">
      <button id="yes" class="btn btn--yes" type="button">yes please</button>
      <button id="no" class="btn btn--no" type="button">no thanks</button>
    </div>
  </main>

  <!-- playful "are you sure?" section — both answers are no 🙂 -->
  <section id="sure" class="sure" aria-hidden="true" aria-label="are you sure">
    <div class="hub-stars" aria-hidden="true"></div>
    <div class="sure-box photo-box">
      <img class="sure-img" src="assets/scenes/mainhub.png" alt="" />
    </div>
    <p class="sure-text">are you sure?</p>
    <div class="ask-btns">
      <button class="btn btn--no2 sure-no" type="button">no</button>
      <button class="btn btn--no2 sure-no" type="button">no</button>
    </div>
  </section>

  <div id="fade" class="fade" aria-hidden="true"></div>

  <script src="js/bunnyRain.js"></script>
  <script src="js/catVideo.js"></script>
  <script src="js/stars.js"></script>
  <script>
    (function () {
      if (window.Stars) {
        Stars.fill(document.getElementById("ask-stars"), 70);
        Stars.fill(document.querySelector("#sure .hub-stars"), 50);
      }

      var ov = document.getElementById("bunny-rain");
      var flagged = false;
      try { flagged = sessionStorage.getItem("mushu:reveal") === "1"; } catch (e) {}
      if (!flagged && /reveal=1/.test(location.search)) flagged = true;
      try { sessionStorage.removeItem("mushu:reveal"); } catch (e) {}
      if (flagged && window.BunnyRain) { BunnyRain.play(function () {}); }
      else if (ov) { ov.remove(); }

      document.getElementById("yes").addEventListener("click", function () {
        var fade = document.getElementById("fade");
        if (fade) fade.classList.add("on");
        window.setTimeout(function () { window.location.href = "meadow.html"; }, 420);
      });

      /* "no thanks" -> are-you-sure section; both "no" buttons return here */
      var sure = document.getElementById("sure");
      document.getElementById("no").addEventListener("click", function () {
        sure.classList.add("open");
        sure.setAttribute("aria-hidden", "false");
      });
      var nos = document.querySelectorAll(".sure-no");
      for (var i = 0; i < nos.length; i++) {
        nos[i].addEventListener("click", function () {
          sure.classList.remove("open");
          sure.setAttribute("aria-hidden", "true");
        });
      }
    })();
  </script>
</body>
</html>
