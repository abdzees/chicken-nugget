<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>a little something</title>
  <meta name="description" content="a tiny handmade world, made just for you" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Nunito:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/landing.css" />
</head>
<body class="landing">
  <!-- soft drifting wallpaper blobs -->
  <div class="wallpaper" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
  </div>

  <main class="lock" role="main">
    <div class="lock-panel">
    <!-- passcode dots -->
    <div id="dots" class="dots" role="status" aria-live="polite" aria-label="passcode entry">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>

    <!-- glass keypad -->
    <div id="keypad" class="keypad" role="group" aria-label="number pad">
      <button type="button" class="key" data-key="1"><span class="num">1</span><span class="sub">&nbsp;</span></button>
      <button type="button" class="key" data-key="2"><span class="num">2</span><span class="sub">A B C</span></button>
      <button type="button" class="key" data-key="3"><span class="num">3</span><span class="sub">D E F</span></button>
      <button type="button" class="key" data-key="4"><span class="num">4</span><span class="sub">G H I</span></button>
      <button type="button" class="key" data-key="5"><span class="num">5</span><span class="sub">J K L</span></button>
      <button type="button" class="key" data-key="6"><span class="num">6</span><span class="sub">M N O</span></button>
      <button type="button" class="key" data-key="7"><span class="num">7</span><span class="sub">P Q R S</span></button>
      <button type="button" class="key" data-key="8"><span class="num">8</span><span class="sub">T U V</span></button>
      <button type="button" class="key" data-key="9"><span class="num">9</span><span class="sub">W X Y Z</span></button>
      <span class="key key--empty" aria-hidden="true"></span>
      <button type="button" class="key" data-key="0"><span class="num">0</span><span class="sub">&nbsp;</span></button>
      <button type="button" class="key key--action" data-action="delete" aria-label="delete">
        <svg viewBox="0 0 30 22" aria-hidden="true"><path d="M10 2 L28 2 Q29 2 29 4 L29 18 Q29 20 28 20 L10 20 Q9 20 8 19 L1 12 Q0 11 1 10 L8 3 Q9 2 10 2 Z" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M14 8 L22 14 M22 8 L14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </button>
    </div>
    </div>
  </main>

  <!-- soft pink veil bridges into the meadow's bunny-rain reveal -->
  <div id="transition" class="transition" aria-hidden="true"></div>

  <script src="js/passcode.js"></script>
</body>
</html>
